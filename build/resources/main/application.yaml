spring:
  application:
    name: jotmang
  datasource:
    url: ${DB_URL:jdbc:h2:mem:jotmang;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1}
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

server:
  port: 8080


jwt:
  secret: ${JWT_SECRET:local-development-jwt-secret-key-must-be-at-least-32-bytes}
  expiration: 86400000
