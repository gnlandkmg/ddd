spring:
  application:
    name: jotmang
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
    show-sql: true

server:
  port: 8080

dauth:
  client-id: ${DAUTH_CLIENT_ID}
  client-secret: ${DAUTH_CLIENT_SECRET}
  redirect-uri: http://localhost:8080/api/auth/veify
  authorize-url: https://dauth.b1nd.com/authorize
  token-url: https://dodam-api.b1nd.com/oauth/token
  user-info-url: https://dodam-api.b1nd.com/user/me
  scope: ${DAUTH_SCOPE}

jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000
